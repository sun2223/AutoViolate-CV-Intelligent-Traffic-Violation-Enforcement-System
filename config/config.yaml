# =============================================================================
# Traffic Violation Detection System - Master Configuration
# Flipkart Gridhackathon Round 2 | Theme 3
# =============================================================================

project:
  name: "AutoViolate-CV"
  version: "1.0.0"
  description: "Automated Traffic Violation Detection & Classification System"
  author: "Team AutoViolate"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  data_root: "/kaggle/input/traffic-violation-dataset"
  train_images: "/kaggle/input/traffic-violation-dataset/train/images"
  train_labels: "/kaggle/input/traffic-violation-dataset/train/labels"
  val_images:   "/kaggle/input/traffic-violation-dataset/val/images"
  val_labels:   "/kaggle/input/traffic-violation-dataset/val/labels"
  test_images:  "/kaggle/input/traffic-violation-dataset/test/images"
  output_dir:   "/kaggle/working/outputs"
  model_dir:    "/kaggle/working/models"
  report_dir:   "/kaggle/working/reports"
  log_dir:      "/kaggle/working/logs"

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset:
  # Kaggle recommended datasets:
  #   - roboflow/traffic-violation-detection
  #   - anshulmehtakaggl/helmet-detection
  #   - andrewmvd/traffic-sign-dataset-in-yolo-format
  #   - Use Indian Traffic dataset if available via Roboflow API
  num_classes: 8
  class_names:
    - "vehicle"
    - "helmet_violation"
    - "seatbelt_violation"
    - "triple_riding"
    - "wrong_side_driving"
    - "stop_line_violation"
    - "red_light_violation"
    - "illegal_parking"
  image_size: [640, 640]
  augmentation: true
  cache_images: true
  num_workers: 4

# ---------------------------------------------------------------------------
# Detection Model (Task 2 & 3)
# ---------------------------------------------------------------------------
detection:
  architecture: "yolov8"          # Best accuracy/speed tradeoff for edge
  model_variant: "yolov8l"        # l=large; swap to 'n' for speed
  pretrained: true
  pretrained_weights: "yolov8l.pt"
  confidence_threshold: 0.45
  nms_iou_threshold: 0.50
  max_detections: 300
  multi_scale_inference: true
  tta_enabled: false              # Test-Time Augmentation (slower, more accurate)
  half_precision: true            # FP16 for GPU speed

# ---------------------------------------------------------------------------
# Classification (Task 4)
# ---------------------------------------------------------------------------
classification:
  backbone: "efficientnet_b3"     # Accuracy-efficient tradeoff
  pretrained: true
  num_epochs: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  label_smoothing: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  focal_loss_gamma: 2.0
  focal_loss_alpha: 0.25

# ---------------------------------------------------------------------------
# LPR - License Plate Recognition (Task 5)
# ---------------------------------------------------------------------------
lpr:
  plate_detector: "yolov8n"       # Lightweight for plate ROI detection
  ocr_engine: "easyocr"           # easyocr | paddleocr | tesseract
  ocr_languages: ["en"]
  super_resolution: true          # ESRGAN-style upsampling on plate crops
  sr_scale: 4
  plate_confidence_threshold: 0.50
  char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
  indian_plate_regex: "^[A-Z]{2}[0-9]{2}[A-Z]{1,2}[0-9]{4}$"

# ---------------------------------------------------------------------------
# Preprocessing (Task 1)
# ---------------------------------------------------------------------------
preprocessing:
  target_size: [640, 640]
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std:  [0.229, 0.224, 0.225]
  clahe_clip_limit: 3.0
  clahe_tile_grid: [8, 8]
  low_light_enhance: true
  derain: false                   # Enable if dataset has rainy images
  deblur: true
  shadow_removal: true

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  batch_size: 16
  epochs: 50
  optimizer: "adamw"
  base_lr: 1.0e-3
  warmup_epochs: 3
  cosine_min_lr: 1.0e-6
  gradient_clip_norm: 10.0
  early_stopping_patience: 10
  ema_decay: 0.9999
  save_best_only: true
  amp: true                       # Automatic Mixed Precision
  seed: 42
  accumulate_grad_batches: 2      # effective batch = 32

# ---------------------------------------------------------------------------
# Evaluation (Task 8)
# ---------------------------------------------------------------------------
evaluation:
  iou_thresholds: [0.50, 0.75]    # mAP@50 and mAP@75
  conf_threshold: 0.25
  nms_threshold: 0.45
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "map50"
    - "map75"
    - "inference_latency_ms"

# ---------------------------------------------------------------------------
# Analytics & Reporting (Task 7)
# ---------------------------------------------------------------------------
reporting:
  generate_html: true
  generate_pdf: true
  generate_csv: true
  dashboard_port: 8050
  top_violations: 10
  heatmap_resolution: [100, 100]

# ---------------------------------------------------------------------------
# Hardware
# ---------------------------------------------------------------------------
hardware:
  device: "auto"                  # auto | cpu | cuda | mps
  num_gpus: 1
  mixed_precision: true
  torch_compile: false            # Requires PyTorch 2.0+
